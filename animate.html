<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Image Carousel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }

        .carousel-container {
            position: relative;
            width: 800px;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .carousel {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .carousel-item {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            color: white;
            text-align: center;
        }

        .carousel-caption h3 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .carousel-caption p {
            font-size: 16px;
        }

        .carousel-nav {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        .nav-dot.active {
            background-color: white;
            transform: scale(1.2);
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
        }

        .carousel-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .prev-btn {
            left: 20px;
        }

        .next-btn {
            right: 20px;
        }

        /* Animation for slide transition */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide-in {
            animation: slideIn 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="carousel-container">
        <div class="carousel">
            <!-- Carousel items will be added dynamically -->
        </div>
        
        <button class="carousel-btn prev-btn">&lt;</button>
        <button class="carousel-btn next-btn">&gt;</button>
        
        <div class="carousel-nav">
            <!-- Navigation dots will be added dynamically -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Carousel data
            const carouselData = [
                {
                    image: 'https://source.unsplash.com/random/800x500?nature',
                    title: 'Beautiful Nature',
                    description: 'Explore the wonders of the natural world'
                },
                {
                    image: 'https://source.unsplash.com/random/800x500?city',
                    title: 'Urban Landscape',
                    description: 'Discover vibrant cityscapes around the globe'
                },
                {
                    image: 'https://source.unsplash.com/random/800x500?technology',
                    title: 'Modern Technology',
                    description: 'The latest innovations shaping our future'
                },
                {
                    image: 'https://source.unsplash.com/random/800x500?food',
                    title: 'Delicious Cuisine',
                    description: 'Taste the world through its diverse flavors'
                }
            ];

            // DOM elements
            const carousel = document.querySelector('.carousel');
            const prevBtn = document.querySelector('.prev-btn');
            const nextBtn = document.querySelector('.next-btn');
            const navDotsContainer = document.querySelector('.carousel-nav');

            // State variables
            let currentIndex = 0;
            let intervalId;
            const slideInterval = 5000; // 5 seconds

            // Initialize carousel
            function initCarousel() {
                // Create carousel items
                carouselData.forEach((item, index) => {
                    const carouselItem = document.createElement('div');
                    carouselItem.className = 'carousel-item';
                    carouselItem.dataset.index = index;
                    
                    const img = document.createElement('img');
                    img.src = item.image;
                    img.alt = item.title;
                    
                    const caption = document.createElement('div');
                    caption.className = 'carousel-caption';
                    
                    const title = document.createElement('h3');
                    title.textContent = item.title;
                    
                    const description = document.createElement('p');
                    description.textContent = item.description;
                    
                    caption.appendChild(title);
                    caption.appendChild(description);
                    carouselItem.appendChild(img);
                    carouselItem.appendChild(caption);
                    carousel.appendChild(carouselItem);
                    
                    // Create navigation dots
                    const dot = document.createElement('div');
                    dot.className = 'nav-dot';
                    dot.dataset.index = index;
                    dot.addEventListener('click', () => goToSlide(index));
                    navDotsContainer.appendChild(dot);
                });
                
                // Set initial active slide
                updateCarousel();
                startAutoSlide();
            }

            // Update carousel display
            function updateCarousel() {
                // Update carousel position
                carousel.style.transform = `translateX(-${currentIndex * 100}%)`;
                
                // Update active dot
                const dots = document.querySelectorAll('.nav-dot');
                dots.forEach((dot, index) => {
                    dot.classList.toggle('active', index === currentIndex);
                });
                
                // Add animation class to current slide
                const currentSlide = document.querySelector(`.carousel-item[data-index="${currentIndex}"]`);
                currentSlide.classList.add('slide-in');
                
                // Remove animation class after animation completes
                setTimeout(() => {
                    currentSlide.classList.remove('slide-in');
                }, 500);
            }

            // Go to specific slide
            function goToSlide(index) {
                currentIndex = index;
                updateCarousel();
                resetAutoSlide();
            }

            // Next slide
            function nextSlide() {
                currentIndex = (currentIndex + 1) % carouselData.length;
                updateCarousel();
                resetAutoSlide();
            }

            // Previous slide
            function prevSlide() {
                currentIndex = (currentIndex - 1 + carouselData.length) % carouselData.length;
                updateCarousel();
                resetAutoSlide();
            }

            // Auto slide functionality
            function startAutoSlide() {
                intervalId = setInterval(nextSlide, slideInterval);
            }

            function resetAutoSlide() {
                clearInterval(intervalId);
                startAutoSlide();
            }

            // Event listeners
            prevBtn.addEventListener('click', prevSlide);
            nextBtn.addEventListener('click', nextSlide);
            
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') {
                    prevSlide();
                } else if (e.key === 'ArrowRight') {
                    nextSlide();
                }
            });
            
            // Pause on hover
            carousel.addEventListener('mouseenter', () => {
                clearInterval(intervalId);
            });
            
            carousel.addEventListener('mouseleave', () => {
                resetAutoSlide();
            });

            // Initialize the carousel
            initCarousel();
        });
    </script>
</body>
</html>
